<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E6BF0"/>
      <stop offset="1" stop-color="#7B2FE3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.30" cy="0.22" r="0.95">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="squircle">
      <rect width="1024" height="1024" rx="230"/>
    </clipPath>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0B1B4A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#glow)"/>

  <!-- repeat ripples -->
  <g clip-path="url(#squircle)" fill="none" stroke="#FFFFFF">
    <circle cx="512" cy="512" r="250" stroke-width="4" stroke-opacity="0.16"/>
    <circle cx="512" cy="512" r="350" stroke-width="4" stroke-opacity="0.11"/>
    <circle cx="512" cy="512" r="460" stroke-width="4" stroke-opacity="0.07"/>
    <circle cx="512" cy="512" r="580" stroke-width="4" stroke-opacity="0.04"/>
  </g>

  <!-- monoline R -->
  <g filter="url(#ds)" fill="none" stroke="#FFFFFF" stroke-width="92" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 372 320 V 704"/>
    <path d="M 372 320 H 510 a 120 120 0 0 1 0 240 H 372"/>
    <path d="M 500 560 L 660 704"/>
  </g>
</svg>
